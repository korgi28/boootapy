<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gravi VPN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f0a1a;
            --header-bg: #1d1433; 
            --header-btn: #2b1f47; 
            --card-bg: #1a1429;
            --neon-purple: #bc13fe;
            --text-color: #ffffff;
            --shadow: 0 0 12px rgba(188, 19, 254, 0.4);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Шапка */
        .header {
            background: var(--header-bg);
            padding: 15px 20px;
            border-bottom: 1px solid rgba(188, 19, 254, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-weight: bold; font-size: 22px; letter-spacing: 1px; }

        /* Приветствие вне плашки */
        .welcome-outside {
            padding: 15px 20px 5px 20px;
            font-size: 14px;
            color: #b0b0b0;
        }

        .welcome-outside b { color: #fff; }

        /* Языковая кнопка */
        .lang-container { position: relative; width: 80px; }
        .lang-current {
            background: var(--header-btn);
            border: 1px solid rgba(188, 19, 254, 0.5);
            color: white;
            padding: 8px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
        }
        .lang-dropdown {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%;
            background: var(--header-btn);
            border: 1px solid var(--neon-purple);
            border-radius: 8px;
            z-index: 100;
        }
        .lang-option { padding: 8px; font-size: 12px; text-align: center; cursor: pointer; border-bottom: 1px solid rgba(188, 19, 254, 0.2); }

        /* Контентная область с прокруткой */
        .content {
            flex: 1;
            padding: 10px 20px;
            overflow-y: auto;
            padding-bottom: 100px;
        }

        .screen { display: none; animation: fadeIn 0.2s ease; }
        .screen.active { display: block; }

        /* Плашки информации */
        .glass-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--neon-purple);
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .balance-card {
            background: #251a3d; /* Отличается от фона */
            text-align: center;
            padding: 30px 20px;
        }

        .info-row { display: flex; justify-content: space-between; margin: 12px 0; font-size: 14px; }
        .info-label { color: #ccc; }
        .info-value { color: var(--neon-purple); font-weight: bold; }

        /* Методы оплаты в балансе */
        .payment-list { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .pay-item {
            background: rgba(188, 19, 254, 0.1);
            border: 1px solid var(--neon-purple);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
        }

        /* Нижнее неоновое меню */
        .navbar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 2px solid var(--neon-purple);
            border-radius: 20px;
            display: flex;
            justify-content: space-around;
            padding: 10px 5px;
            box-shadow: var(--shadow);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #888;
            font-size: 10px;
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            flex: 1;
        }

        .nav-item.active { color: var(--neon-purple); }
        .nav-item svg { width: 22px; height: 22px; margin-bottom: 4px; fill: currentColor; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">🌌 Gravi</div>
        <div class="lang-container">
            <div class="lang-current" id="lang-btn" onclick="toggleLangMenu()">RU</div>
            <div class="lang-dropdown" id="lang-dropdown">
                <div class="lang-option" onclick="setLanguage('ru')">🇷🇺 RU</div>
                <div class="lang-option" onclick="setLanguage('en')">🇺🇸 EN</div>
            </div>
        </div>
    </div>

    <div class="welcome-outside">
        <span data-i18n="welcome">Добро пожаловать</span>, <b id="header-user">Гость</b>
    </div>

    <div class="content">
        <div id="main-screen" class="screen active">
            <div class="glass-card">
                <div class="info-row">
                    <span class="info-label" data-i18n="profile">👤 Профиль:</span>
                    <span class="info-value" id="username">User</span>
                </div>
                <div class="info-row">
                    <span class="info-label" data-i18n="status">🛡️ Статус:</span>
                    <span class="info-value" data-i18n="no_sub">Нет подписки</span>
                </div>
            </div>
            <div class="glass-card">
                <p style="font-size: 13px; text-align: center;" data-i18n="ref_text">Ваша реферальная ссылка:</p>
                <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                    <code id="ref-link" style="color: var(--neon-purple); font-size: 11px;">t.me/bot?start=1</code>
                    <button onclick="copyLink()" style="background: none; border: 1px solid var(--neon-purple); color: #fff; border-radius: 5px; padding: 4px 8px; font-size: 10px;">COPY</button>
                </div>
            </div>
        </div>

        <div id="subs-screen" class="screen">
            <h2 style="text-align: center;" data-i18n="btn_subs">Подписки</h2>
            <div class="glass-card">
                <div class="info-row"><span>🐣 Minimal</span> <span>150₽</span></div>
                <div class="info-row"><span>🚀 Medium</span> <span>300₽</span></div>
                <div class="info-row"><span>👑 Maximal</span> <span>500₽</span></div>
            </div>
        </div>

        <div id="topup-screen" class="screen">
            <div class="glass-card balance-card">
                <span style="font-size: 12px; opacity: 0.7;" data-i18n="balance_label">Текущий баланс</span>
                <div style="font-size: 32px; font-weight: bold; margin: 10px 0;">0.00 ₽</div>
            </div>
            <div class="payment-list">
                <div class="pay-item">📲 СБП</div>
                <div class="pay-item">🌐 Crypto (TON/USDT)</div>
                <div class="pay-item">💳 Карты РФ</div>
            </div>
        </div>
    </div>

    <div class="navbar">
        <div class="nav-item active" id="nav-home" onclick="navTo('main-screen', 'nav-home')">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span data-i18n="nav_home">Главная</span>
        </div>
        <div class="nav-item" id="nav-subs" onclick="navTo('subs-screen', 'nav-subs')">
            <svg viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
            <span data-i18n="btn_subs">Подписка</span>
        </div>
        <div class="nav-item" id="nav-wallet" onclick="navTo('topup-screen', 'nav-wallet')">
            <svg viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
            <span data-i18n="nav_wallet">Баланс</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const i18n = {
            ru: {
                welcome: "Добро пожаловать",
                profile: "Профиль:",
                status: "Статус:",
                no_sub: "Нет подписки",
                btn_subs: "Подписка",
                balance_label: "Текущий баланс",
                nav_home: "Главная",
                nav_wallet: "Баланс",
                ref_text: "Ваша реферальная ссылка:",
                alert_copy: "Ссылка скопирована!"
            },
            en: {
                welcome: "Welcome",
                profile: "Profile:",
                status: "Status:",
                no_sub: "No subscription",
                btn_subs: "Subscription",
                balance_label: "Current balance",
                nav_home: "Home",
                nav_wallet: "Wallet",
                ref_text: "Your referral link:",
                alert_copy: "Link copied!"
            }
        };

        function navTo(screenId, navId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            document.getElementById(navId).classList.add('active');
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function toggleLangMenu() {
            const menu = document.getElementById('lang-dropdown');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        function setLanguage(lang) {
            document.getElementById('lang-btn').innerText = lang.toUpperCase();
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = i18n[lang][key];
            });
            document.getElementById('lang-dropdown').style.display = 'none';
        }

        const user = tg.initDataUnsafe?.user;
        if (user) {
            const name = user.username || user.first_name;
            document.getElementById('username').innerText = name;
            document.getElementById('header-user').innerText = name;
            document.getElementById('ref-link').innerText = `t.me/bot?start=${user.id}`;
        }

        function copyLink() {
            const linkText = document.getElementById('ref-link').innerText;
            navigator.clipboard.writeText(linkText);
            tg.showAlert("✅");
        }
    </script>
</body>
</html>
