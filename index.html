<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gravi VPN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f0a1a;
            --header-bg: #1d1433; 
            --header-btn: #2b1f47; 
            --card-bg: #1a1429;
            --neon-purple: #bc13fe;
            --text-color: #ffffff;
            --shadow: 0 0 12px rgba(188, 19, 254, 0.4);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Шапка */
        .header {
            background: var(--header-bg);
            padding: 15px 20px;
            border-bottom: 1px solid rgba(188, 19, 254, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-weight: bold; font-size: 22px; letter-spacing: 1px; }

        .page-title-area { padding: 20px 20px 5px 20px; min-height: 60px; }
        #dynamic-title { font-size: 22px; font-weight: bold; margin: 0; line-height: 1.2; }

        /* Язык */
        .lang-container { position: relative; width: 95px; }
        .lang-current {
            background: var(--header-btn);
            border: 1px solid rgba(188, 19, 254, 0.5);
            color: white;
            padding: 8px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .lang-dropdown {
            display: none; position: absolute; top: 0; left: 0; width: 100%;
            background: var(--header-btn); border: 1px solid var(--neon-purple);
            border-radius: 8px; z-index: 100;
        }
        .lang-option { padding: 10px; font-size: 13px; text-align: center; cursor: pointer; border-bottom: 1px solid rgba(188, 19, 254, 0.2); }

        /* Контент */
        .content { flex: 1; padding: 10px 20px; overflow-y: auto; padding-bottom: 120px; }
        .screen { display: none; animation: fadeIn 0.2s ease forwards; }
        .screen.active { display: block; }

        .glass-card {
            background: var(--card-bg); padding: 20px; border-radius: 15px;
            border: 1px solid var(--neon-purple); box-shadow: var(--shadow); margin-bottom: 15px;
        }

        .info-row { display: flex; justify-content: space-between; margin: 12px 0; font-size: 15px; }
        .info-value { color: var(--neon-purple); font-weight: bold; }

        .action-btn {
            background: var(--card-bg); border: 1px solid var(--neon-purple);
            color: #fff; padding: 18px; border-radius: 12px; margin-bottom: 10px;
            text-align: center; font-weight: bold; cursor: pointer; display: block; width: 100%;
        }
        .action-btn:active { background: rgba(188, 19, 254, 0.2); }

        /* Сообщение о техработах */
        .maintenance-box {
            background: rgba(188, 19, 254, 0.05);
            border: 1px dashed var(--neon-purple);
            padding: 30px 20px;
            border-radius: 15px;
            text-align: center;
        }

        /* Navbar */
        .navbar {
            position: fixed; bottom: 20px; left: 15px; right: 15px;
            background: var(--card-bg); border: 2px solid var(--neon-purple);
            border-radius: 20px; display: flex; justify-content: space-around;
            padding: 12px 5px; box-shadow: var(--shadow); z-index: 1000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #777; font-size: 10px; text-transform: uppercase; font-weight: bold; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--neon-purple); }
        .nav-item svg { width: 22px; height: 22px; margin-bottom: 4px; fill: currentColor; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">🌌 Gravi</div>
        <div class="lang-container">
            <div class="lang-current" id="lang-btn" onclick="toggleLangMenu()"><span>🇷🇺</span> <span>RU</span></div>
            <div class="lang-dropdown" id="lang-dropdown">
                <div class="lang-option" onclick="setLanguage('ru', '🇷🇺')">🇷🇺 RU</div>
                <div class="lang-option" onclick="setLanguage('en', '🇺🇸')">🇺🇸 EN</div>
            </div>
        </div>
    </div>

    <div class="page-title-area">
        <p id="dynamic-title"></p>
    </div>

    <div class="content">
        <div id="main-screen" class="screen active">
            <div class="glass-card">
                <div class="info-row"><span data-i18n="profile">Профиль:</span><span class="info-value" id="username">User</span></div>
                <div class="info-row"><span data-i18n="status">Статус:</span><span class="info-value" data-i18n="no_sub">Нет подписки</span></div>
                <div class="info-row" style="border-top: 1px solid rgba(188, 19, 254, 0.2); padding-top: 12px; margin-top: 12px;">
                    <span data-i18n="sub_price">Цена подписки:</span><span class="info-value">1 200 000 ₽</span>
                </div>
            </div>
        </div>

        <div id="topup-screen" class="screen">
            <div class="glass-card" style="text-align: center; background: #251a3d;">
                <span style="font-size: 13px; opacity: 0.7;" data-i18n="balance_label">Текущий баланс</span>
                <div style="font-size: 32px; font-weight: bold; margin: 10px 0;">0.00 ₽</div>
            </div>
            <div class="action-btn" onclick="copyValue('https://pay-link.com', 'Ссылка на оплату')">📲 Пример копирования ссылки</div>
        </div>

        <div id="ref-screen" class="screen">
            <div class="maintenance-box">
                <div style="font-size: 40px; margin-bottom: 15px;">🛠️</div>
                <h3 style="margin: 0 0 10px 0; color: var(--neon-purple);" data-i18n="maint_title">Технические работы</h3>
                <p style="font-size: 14px; color: #ccc; margin: 0;" data-i18n="maint_desc">Данная функция пока что не доступна.</p>
            </div>
        </div>
    </div>

    <div class="navbar">
        <div class="nav-item active" id="nav-home" onclick="navTo('main-screen', 'nav-home')"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span data-i18n="nav_home">Главная</span></div>
        <div class="nav-item" id="nav-wallet" onclick="navTo('topup-screen', 'nav-wallet')"><svg viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg><span data-i18n="nav_wallet">Баланс</span></div>
        <div class="nav-item" id="nav-ref" onclick="navTo('ref-screen', 'nav-ref')"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg><span data-i18n="nav_ref">Друзья</span></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const i18n = {
            ru: {
                welcome: "Добро пожаловать,", profile: "Профиль:", status: "Статус:", no_sub: "Нет подписки",
                sub_price: "Цена подписки:", balance_label: "Текущий баланс", nav_home: "Главная", nav_wallet: "Баланс",
                nav_ref: "Друзья", maint_title: "Технические работы", maint_desc: "Функция пока что не доступна.",
                copy_msg: "успешно скопировано!"
            },
            en: {
                welcome: "Welcome,", profile: "Profile:", status: "Status:", no_sub: "No sub",
                sub_price: "Sub price:", balance_label: "Current balance", nav_home: "Home", nav_wallet: "Balance",
                nav_ref: "Friends", maint_title: "Maintenance", maint_desc: "This feature is currently unavailable.",
                copy_msg: "copied successfully!"
            }
        };

        let currentLang = 'ru';
        let userName = "Гость";

        function updateTitle(screenId) {
            const titleEl = document.getElementById('dynamic-title');
            if (screenId === 'main-screen') {
                titleEl.innerHTML = `${i18n[currentLang].welcome} <br><b>${userName}</b>`;
                titleEl.style.fontSize = "26px";
            } else {
                titleEl.style.fontSize = "22px";
                titleEl.innerText = i18n[currentLang][document.getElementById(screenId.replace('-screen','')).id.replace('nav-','nav_')] || "";
                if (screenId === 'topup-screen') titleEl.innerText = i18n[currentLang].nav_wallet;
                if (screenId === 'ref-screen') titleEl.innerText = i18n[currentLang].nav_ref;
            }
        }

        function navTo(screenId, navId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            document.getElementById(navId).classList.add('active');
            updateTitle(screenId);
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function copyValue(val, label) {
            navigator.clipboard.writeText(val).then(() => {
                tg.showAlert(`${label} ${i18n[currentLang].copy_msg}`);
            });
        }

        function toggleLangMenu() {
            const menu = document.getElementById('lang-dropdown');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        function setLanguage(lang, flag) {
            currentLang = lang;
            document.getElementById('lang-btn').innerHTML = `<span>${flag}</span> <span>${lang.toUpperCase()}</span>`;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = i18n[lang][key];
            });
            updateTitle(document.querySelector('.screen.active').id);
            document.getElementById('lang-dropdown').style.display = 'none';
        }

        const user = tg.initDataUnsafe?.user;
        if (user) {
            userName = user.first_name;
            document.getElementById('username').innerText = user.username || user.first_name;
        }
        updateTitle('main-screen');

        window.onclick = function(event) {
            if (!event.target.closest('.lang-container')) {
                document.getElementById('lang-dropdown').style.display = 'none';
            }
        }
    </script>
</body>
</html>
